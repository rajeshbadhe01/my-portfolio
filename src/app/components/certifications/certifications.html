<section id="certifications" class="py-24 px-4 md:px-8 relative">
  <div class="max-w-5xl mx-auto">
    <!-- Section Header -->
    <div class="text-center mb-16">
      <h2 class="text-3xl md:text-5xl font-bold text-white mb-4">Certifications</h2>
      <div class="h-1.5 w-20 bg-indigo-500 rounded-full mx-auto"></div>
    </div>

    <!-- Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      @for (cert of certifications; track cert.title + cert.issuer) {
        <div class="flex items-start gap-4 p-6 bg-slate-950/40 border border-slate-800 rounded-2xl backdrop-blur-sm hover:border-slate-700/60 transition-all duration-300">
          <!-- Cert Icon -->
          <div class="p-3 bg-indigo-500/10 rounded-xl text-indigo-400 border border-indigo-500/10 shrink-0">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
            </svg>
          </div>

          <!-- Details -->
          <div class="space-y-1.5 flex-grow">
            <h3 class="text-lg font-bold text-white leading-snug">{{ cert.title }}</h3>
            <p class="text-sm font-semibold text-slate-350">{{ cert.issuer }}</p>
            <div class="flex items-center justify-between gap-4 pt-1">
              <span class="text-xs font-medium text-slate-500">{{ cert.date }}</span>
              @if (cert.credentialUrl) {
                <a [href]="cert.credentialUrl" target="_blank" rel="noopener" class="inline-flex items-center gap-1 text-xs font-semibold text-indigo-400 hover:text-indigo-300 transition-colors">
                  Verify Credential
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                </a>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
