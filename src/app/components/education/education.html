<section id="education" class="py-24 px-4 md:px-8 bg-slate-900/40 relative">
  <div class="max-w-4xl mx-auto">
    <!-- Section Header -->
    <div class="text-center mb-16">
      <h2 class="text-3xl md:text-5xl font-bold text-white mb-4">Education</h2>
      <div class="h-1.5 w-20 bg-indigo-500 rounded-full mx-auto"></div>
    </div>

    <!-- Education timeline grid -->
    <div class="space-y-8">
      @for (item of educationHistory; track item.degree + item.institution) {
        <div class="group p-6 md:p-8 bg-slate-950/40 border border-slate-800 rounded-2xl backdrop-blur-sm hover:border-indigo-500/30 transition-all duration-300">
          <div class="flex flex-col md:flex-row md:justify-between md:items-start gap-4">
            <div class="space-y-2">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-500/10 rounded-lg text-indigo-400 border border-indigo-500/10">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/></svg>
                </div>
                <h3 class="text-xl md:text-2xl font-bold text-white group-hover:text-indigo-400 transition-colors">
                  {{ item.degree }}
                </h3>
              </div>
              <p class="text-slate-300 font-semibold pl-10">{{ item.institution }}</p>
              @if (item.details) {
                <p class="text-slate-400 text-sm md:text-base leading-relaxed pl-10 pt-1">
                  {{ item.details }}
                </p>
              }
            </div>
            
            <div class="flex md:flex-col items-start md:items-end gap-2 shrink-0 pl-10 md:pl-0">
              <span class="px-3 py-1 text-xs md:text-sm font-semibold text-slate-350 bg-slate-800/80 rounded-full border border-slate-700/50">
                {{ item.duration }}
              </span>
              @if (item.grade) {
                <span class="text-sm font-semibold text-indigo-400 bg-indigo-500/5 px-2.5 py-0.5 rounded border border-indigo-500/10">
                  Grade: {{ item.grade }}
                </span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
